<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>求人情報 | 南国石油</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; color: #333; }
    header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 20px; text-align: center; }
    header h1 { font-size: 2em; letter-spacing: 4px; margin-bottom: 5px; }
    header p { font-size: 0.9em; opacity: 0.8; letter-spacing: 2px; }
    nav { background: #e63946; display: flex; justify-content: center; flex-wrap: wrap; }
    nav a { color: white; text-decoration: none; padding: 14px 28px; font-weight: bold; letter-spacing: 1px; transition: background 0.2s; }
    nav a:hover { background: rgba(255,255,255,0.2); }
    .page-title { background: #e63946; color: white; text-align: center; padding: 30px 20px; }
    .page-title h2 { font-size: 1.6em; letter-spacing: 3px; }
    .container { max-width: 750px; margin: 40px auto; padding: 0 20px; }
    .job-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px; margin-bottom: 25px; }
    .job-card h3 { font-size: 1.2em; color: #1a1a2e; border-left: 4px solid #e63946; padding-left: 12px; margin-bottom: 20px; letter-spacing: 1px; }
    .job-table { width: 100%; border-collapse: collapse; }
    .job-table tr { border-bottom: 1px solid #f0f0f0; }
    .job-table tr:last-child { border-bottom: none; }
    .job-table th { width: 140px; padding: 12px 15px; background: #f8f8f8; color: #555; font-size: 0.88em; text-align: left; vertical-align: top; }
    .job-table td { padding: 12px 15px; font-size: 0.9em; line-height: 1.7; color: #444; }
    .badge { display: inline-block; background: #e63946; color: white; padding: 3px 10px; border-radius: 20px; font-size: 0.8em; margin-right: 6px; margin-bottom: 4px; }
    .contact-card { background: #1a1a2e; color: white; border-radius: 12px; padding: 30px; text-align: center; margin-top: 30px; }
    .contact-card h3 { font-size: 1.1em; margin-bottom: 15px; letter-spacing: 2px; }
    .contact-card p { opacity: 0.85; font-size: 0.9em; line-height: 1.8; }
    .contact-card a { color: #e63946; text-decoration: none; font-weight: bold; font-size: 1.1em; }
    footer { background: #1a1a2e; color: rgba(255,255,255,0.7); text-align: center; padding: 30px 20px; font-size: 0.85em; margin-top: 40px; }
  </style>
</head>
<body>
  <header>
    <h1>南国石油</h1>
